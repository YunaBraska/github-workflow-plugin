name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish, for example v2024.3.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build Release Asset
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Fetch sources
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and verify plugin
        shell: sh
        run: ./gradlew --no-daemon check verifyPlugin buildPlugin --warning-mode all

      - name: Create or update GitHub release asset
        shell: sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" ./build/distributions/*.zip --clobber
          else
            gh release create "$RELEASE_TAG" ./build/distributions/*.zip --title "$RELEASE_TAG" --notes "Plugin release $RELEASE_TAG"
          fi
