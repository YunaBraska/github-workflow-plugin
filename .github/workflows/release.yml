name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish as a GitHub release.
        required: true
        type: string
      dry_run:
        description: Build and validate without creating or updating a GitHub release.
        required: true
        default: false
        type: boolean

permissions:
  actions: write
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Build GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}

    steps:
      - name: Validate tag
        shell: sh
        run: |
          if ! printf '%s\n' "$RELEASE_TAG" | grep -Eq '^v[0-9]{4}[.][1-9][0-9]?[.][1-9][0-9]?$'; then
            echo "Tag must look like v2026.5.20: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Fetch sources
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up plugin build
        uses: ./.github/actions/setup-plugin-build
        with:
          gradle-cache-read-only: 'true'

      - name: Test, verify, and build plugin
        shell: sh
        run: ./gradlew --no-daemon check verifyPlugin buildPlugin --warning-mode all

      - name: Extract release notes
        shell: sh
        run: |
          version="${RELEASE_TAG#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { found = 1; next }
            found && $0 ~ /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            awk '
              /^## \[Unreleased\]/ { found = 1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md > release-notes.md
          fi

          if [ ! -s release-notes.md ]; then
            printf 'Plugin release %s\n' "$RELEASE_TAG" > release-notes.md
          fi

      - name: Create or update GitHub release
        shell: sh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run: would create or update GitHub release $RELEASE_TAG"
            exit 0
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" ./build/distributions/*.zip --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" ./build/distributions/*.zip --title "$RELEASE_TAG" --notes-file release-notes.md
          fi

          if [ -z "$RELEASE_TOKEN" ]; then
            if gh workflow view publish-marketplace.yml >/dev/null 2>&1; then
              gh workflow run publish-marketplace.yml --ref "$RELEASE_TAG" -f tag="$RELEASE_TAG" -f dry_run=false
            else
              echo "Publish workflow is not on the default branch yet; release event automation will take over after merge."
            fi
          fi
