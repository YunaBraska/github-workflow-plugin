name: Tag

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create. Defaults to today's vYYYY.M.D.
        required: false
        type: string
      dry_run:
        description: Build and validate without pushing a tag.
        required: true
        default: true
        type: boolean

permissions:
  actions: write
  contents: write

concurrency:
  group: tag-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    name: Test, Verify, Build, Tag
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Fetch sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Resolve release tag
        id: tag
        shell: sh
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            release_tag="$INPUT_TAG"
          else
            year="$(date -u +%Y)"
            month="$(date -u +%m | sed 's/^0//')"
            day="$(date -u +%d | sed 's/^0//')"
            version="$year.$month.$day"
            release_tag="v$version"
          fi

          if ! printf '%s\n' "$release_tag" | grep -Eq '^v[0-9]{4}[.][1-9][0-9]?[.][1-9][0-9]?$'; then
            echo "Tag must look like v2026.5.20: $release_tag" >&2
            exit 1
          fi

          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=${release_tag#v}" >> "$GITHUB_OUTPUT"

      - name: Prepare release version
        shell: sh
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          RELEASE_VERSION: ${{ steps.tag.outputs.version }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "Tag already exists: $RELEASE_TAG" >&2
            exit 1
          fi

          awk -v version="$RELEASE_VERSION" '
            /^[[:space:]]*pluginVersion[[:space:]]*=/ {
              print "pluginVersion = " version
              next
            }
            { print }
          ' gradle.properties > gradle.properties.tmp
          mv gradle.properties.tmp gradle.properties

          if ! git diff --quiet -- gradle.properties; then
            git config user.name "Kira"
            git config user.email "kira@yuna.berlin"
            git add gradle.properties
            if [ "$DRY_RUN" = "true" ]; then
              echo "Dry run: would commit pluginVersion $RELEASE_VERSION"
            else
              git commit -m "chore: release $RELEASE_VERSION"
            fi
          fi

      - name: Test, verify, and build plugin
        shell: sh
        run: ./gradlew --no-daemon check verifyPlugin buildPlugin --warning-mode all

      - name: Push release commit and tag
        shell: sh
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run: would create $RELEASE_TAG"
            exit 0
          fi

          git config user.name "Kira"
          git config user.email "kira@yuna.berlin"

          if [ -n "$RELEASE_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

          target_branch="$GITHUB_REF_NAME"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            target_branch="${GITHUB_BASE_REF:-main}"
          fi
          git push origin "HEAD:$target_branch"

          git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"
          git push origin "refs/tags/$RELEASE_TAG"

          if [ -z "$RELEASE_TOKEN" ]; then
            gh workflow run release.yml --ref "$RELEASE_TAG" -f tag="$RELEASE_TAG"
          fi
