name: Tag

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create. Defaults to v<pluginVersion>.
        required: false
        type: string
      dry_run:
        description: Build and validate without pushing a tag.
        required: true
        default: true
        type: boolean

permissions:
  actions: write
  contents: write

concurrency:
  group: tag-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    name: Test, Verify, Build, Tag
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Fetch sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Resolve release tag
        id: tag
        shell: sh
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            release_tag="$INPUT_TAG"
          else
            version="$(awk -F= '/^[[:space:]]*pluginVersion[[:space:]]*=/{ gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2); print $2 }' gradle.properties)"
            release_tag="v$version"
          fi

          if ! printf '%s\n' "$release_tag" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z._-]+)?$'; then
            echo "Tag must look like v2024.3.0 or v2024.3.0-rc.1: $release_tag" >&2
            exit 1
          fi

          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Test, verify, and build plugin
        shell: sh
        run: ./gradlew --no-daemon check verifyPlugin buildPlugin --warning-mode all

      - name: Create release tag
        shell: sh
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "Tag already exists: $RELEASE_TAG" >&2
            exit 1
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run: would create $RELEASE_TAG"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$RELEASE_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

          git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"
          git push origin "refs/tags/$RELEASE_TAG"

          if [ -z "$RELEASE_TOKEN" ]; then
            gh workflow run release.yml --ref "$RELEASE_TAG" -f tag="$RELEASE_TAG"
          fi
