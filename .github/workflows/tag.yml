name: Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create, for example v2024.3.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    name: Test, Verify, Build, Tag
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Fetch sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test, verify, and build plugin
        shell: sh
        run: ./gradlew --no-daemon check verifyPlugin buildPlugin --warning-mode all

      - name: Create tag
        shell: sh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          case "$RELEASE_TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Tag must look like v2024.3.0" >&2
              exit 1
              ;;
          esac

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "Tag already exists: $RELEASE_TAG" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"
