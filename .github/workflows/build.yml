name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  build:
    name: Test, Verify, Package
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Free disk space
        shell: sh
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Fetch sources
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Test and verify plugin
        shell: sh
        run: ./gradlew --no-daemon check verifyPlugin --warning-mode all

      - name: Build plugin archive
        shell: sh
        run: ./gradlew --no-daemon buildPlugin --warning-mode all

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            build/reports/tests
            build/reports/jacoco

      - name: Upload verifier reports
        id: upload
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: plugin-verifier-reports
          path: build/reports/pluginVerifier

      - name: Upload plugin archive
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: plugin-archive
          path: build/distributions/*.zip
