name: Pipeline

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag. Empty means today's YYYY.M.D.
        required: false
        type: string
      dry_run:
        description: Validate release without publishing.
        required: true
        default: false
        type: boolean
  push:
    branches:
      - '**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  actions: write
  contents: write
  packages: write

concurrency:
  group: pipeline-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  pipeline:
    name: Test, Build, Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: ЁЯз╣ Free disk space
        shell: sh
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: ЁЯУе Fetch sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: ЁЯзн Plan run
        id: plan
        shell: sh
        env:
          HEAD_MESSAGE: ${{ github.event.head_commit.message || '' }}
          INPUT_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          INPUT_TAG: ${{ inputs.tag || '' }}
        run: |
          release="false"
          dry_run="false"
          plugin_id="$(sed -n 's/^[[:space:]]*pluginId[[:space:]]*=[[:space:]]*//p' gradle.properties | head -n 1 | tr -d '\r')"
          plugin_version="$(sed -n 's/^[[:space:]]*pluginVersion[[:space:]]*=[[:space:]]*//p' gradle.properties | head -n 1 | tr -d '\r')"

          if [ -z "$plugin_id" ] || [ -z "$plugin_version" ]; then
            echo "Missing pluginId or pluginVersion in gradle.properties." >&2
            exit 1
          fi

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            release="true"
            dry_run="$INPUT_DRY_RUN"
          elif [ "$GITHUB_EVENT_NAME" = "push" ] \
            && [ "$GITHUB_REF" = "refs/heads/main" ] \
            && ! printf '%s\n' "$HEAD_MESSAGE" | grep -Eq '^chore: release '; then
            release="true"
          fi

          release_tag=""
          target_version="$plugin_version"
          if [ "$release" = "true" ]; then
            input_tag="$INPUT_TAG"
            case "$input_tag" in
              v*) input_tag="${input_tag#v}" ;;
            esac

            if [ -n "$input_tag" ]; then
              release_tag="$input_tag"
            else
              year="$(date -u +%Y)"
              month="$(date -u +%m | sed 's/^0//')"
              day="$(date -u +%d | sed 's/^0//')"
              release_tag="$year.$month.$day"
            fi

            if ! printf '%s\n' "$release_tag" | grep -Eq '^[0-9]{4}[.][1-9][0-9]?[.][1-9][0-9]?$'; then
              echo "Tag must look like 2026.5.20: $release_tag" >&2
              exit 1
            fi
            target_version="$release_tag"
          fi

          echo "event=$GITHUB_EVENT_NAME"
          echo "branch=${GITHUB_REF_NAME:-unknown}"
          echo "release=$release"
          echo "dry_run=$dry_run"
          echo "plugin_id=$plugin_id"
          echo "plugin_version=$plugin_version"
          echo "target_version=$target_version"
          echo "release_tag=$release_tag"

          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"
          echo "plugin_id=$plugin_id" >> "$GITHUB_OUTPUT"
          echo "plugin_version=$plugin_version" >> "$GITHUB_OUTPUT"
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$target_version" >> "$GITHUB_OUTPUT"

      - name: ЁЯЧЭя╕П Resolve cache key
        id: cache-key
        shell: sh
        run: |
          {
            sed '/^[[:space:]]*pluginVersion[[:space:]]*=/d' gradle.properties
            cat build.gradle settings.gradle gradle/wrapper/gradle-wrapper.properties
          } | sha256sum | awk '{ print "key=plugin-ci-${{ runner.os }}-" $1 }' >> "$GITHUB_OUTPUT"

      - name: тЩ╗я╕П Restore cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.gradle/caches/transforms-*
            ~/.gradle/caches/*/transforms
            ~/.gradle/wrapper
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            plugin-ci-${{ runner.os }}-

      - name: тШХ Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: ЁЯР│ Check Docker
        shell: sh
        run: |
          docker version
          docker info

      - name: ЁЯП╖я╕П Prepare release metadata
        if: steps.plan.outputs.release == 'true'
        shell: sh
        env:
          DRY_RUN: ${{ steps.plan.outputs.dry_run }}
          RELEASE_TAG: ${{ steps.plan.outputs.tag }}
          RELEASE_VERSION: ${{ steps.plan.outputs.version }}
        run: |
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "Tag already exists: $RELEASE_TAG" >&2
            exit 1
          fi

          awk -v version="$RELEASE_VERSION" '
            /^[[:space:]]*pluginVersion[[:space:]]*=/ {
              print "pluginVersion = " version
              next
            }
            { print }
          ' gradle.properties > gradle.properties.tmp
          mv gradle.properties.tmp gradle.properties

          release_date="$(date -u +%Y-%m-%d)"
          if grep -Eq "^## \\[$RELEASE_VERSION\\]" CHANGELOG.md; then
            echo "CHANGELOG.md already contains $RELEASE_VERSION"
          else
            awk -v version="$RELEASE_VERSION" -v release_date="$release_date" '
              /^## \[Unreleased\]/ && !released {
                print "## [Unreleased]"
                print ""
                print "## [" version "] - " release_date
                released = 1
                next
              }
              { print }
            ' CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
          fi

          if ! git diff --quiet -- gradle.properties CHANGELOG.md; then
            git config user.name "Kira"
            git config user.email "kira@yuna.berlin"
            git add gradle.properties CHANGELOG.md
            if [ "$DRY_RUN" = "true" ]; then
              echo "Dry run: would commit release metadata $RELEASE_VERSION"
            else
              git commit -m "chore: release $RELEASE_VERSION [skip ci]"
            fi
          fi

      - name: ЁЯФР Validate release secrets
        if: steps.plan.outputs.release == 'true' && steps.plan.outputs.dry_run != 'true'
        shell: sh
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          if [ -z "$PUBLISH_TOKEN" ]; then
            echo "Missing release secret: PUBLISH_TOKEN" >&2
            exit 1
          fi

          case "$PUBLISH_TOKEN" in
            *[[:space:]]*)
              echo "PUBLISH_TOKEN contains whitespace." >&2
              exit 1
              ;;
            perm-*|perm:*)
              ;;
            *)
              echo "PUBLISH_TOKEN does not look like a JetBrains permanent token." >&2
              exit 1
              ;;
          esac

          token_length="$(printf '%s' "$PUBLISH_TOKEN" | wc -c | tr -d ' ')"
          if [ "$token_length" -lt 20 ]; then
            echo "PUBLISH_TOKEN is too short." >&2
            exit 1
          fi
          echo "publish_token=present length=$token_length format=permanent-token"

      - name: ЁЯзк Test and package
        shell: sh
        env:
          RELEASE: ${{ steps.plan.outputs.release }}
        run: |
          if [ "$RELEASE" = "true" ]; then
            ./gradlew --no-daemon check verifyPlugin buildPlugin --warning-mode all
          else
            ./gradlew --no-daemon check buildPlugin --warning-mode all
          fi

      - name: ЁЯУж Locate release archive
        id: archive
        if: steps.plan.outputs.release == 'true'
        shell: sh
        run: |
          archive="$(find build/distributions -maxdepth 1 -type f -name '*.zip' | sort | head -n 1)"

          if [ -z "$archive" ]; then
            echo "No release archive found." >&2
            exit 1
          fi

          echo "path=$archive" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$archive")" >> "$GITHUB_OUTPUT"

      - name: ЁЯУЭ Extract release notes
        if: steps.plan.outputs.release == 'true'
        shell: sh
        env:
          RELEASE_TAG: ${{ steps.plan.outputs.tag }}
        run: |
          version="$RELEASE_TAG"
          case "$version" in
            v*) version="${version#v}" ;;
          esac
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { found = 1; next }
            found && $0 ~ /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            awk '
              /^## \[Unreleased\]/ { found = 1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md > release-notes.md
          fi

          if [ ! -s release-notes.md ]; then
            printf 'Plugin release %s\n' "$RELEASE_TAG" > release-notes.md
          fi

      - name: ЁЯУЪ Publish GitHub package
        if: steps.plan.outputs.release == 'true' && steps.plan.outputs.dry_run != 'true'
        shell: sh
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ./gradlew --no-daemon publishPluginZipPublicationToGitHubPackagesRepository --warning-mode all

      - name: ЁЯЫТ Publish Marketplace
        if: steps.plan.outputs.release == 'true' && steps.plan.outputs.dry_run != 'true'
        shell: sh
        env:
          ARCHIVE_PATH: ${{ steps.archive.outputs.path }}
          MARKETPLACE_CHANNEL: ${{ vars.MARKETPLACE_CHANNEL || '' }}
          PLUGIN_ID: ${{ steps.plan.outputs.plugin_id }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          set -- --fail-with-body --retry 3 --retry-delay 10 \
            --header "Authorization: Bearer $PUBLISH_TOKEN" \
            -F "xmlId=$PLUGIN_ID" \
            -F "file=@$ARCHIVE_PATH"

          if [ -n "$MARKETPLACE_CHANNEL" ]; then
            set -- "$@" -F "channel=$MARKETPLACE_CHANNEL"
          fi
          curl "$@" https://plugins.jetbrains.com/api/updates/upload

      - name: ЁЯУд Push release commit
        id: release_source
        if: steps.plan.outputs.release == 'true' && steps.plan.outputs.dry_run != 'true'
        shell: sh
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git config user.name "Kira"
          git config user.email "kira@yuna.berlin"

          if [ -n "$RELEASE_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

          target_branch="${GITHUB_REF_NAME:-main}"
          release_target="$(git rev-parse HEAD)"
          git push origin "HEAD:$target_branch"
          echo "target=$release_target" >> "$GITHUB_OUTPUT"

      - name: ЁЯЪА Create GitHub release
        if: steps.plan.outputs.release == 'true' && steps.plan.outputs.dry_run != 'true'
        shell: sh
        env:
          ARCHIVE_PATH: ${{ steps.archive.outputs.path }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          RELEASE_TAG: ${{ steps.plan.outputs.tag }}
          RELEASE_TARGET: ${{ steps.release_source.outputs.target }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ARCHIVE_PATH" --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release-notes.md
          else
            if ! gh release create "$RELEASE_TAG" "$ARCHIVE_PATH" --title "$RELEASE_TAG" --notes-file release-notes.md --target "$RELEASE_TARGET"; then
              gh release delete "$RELEASE_TAG" --yes --cleanup-tag >/dev/null 2>&1 || true
              exit 1
            fi
          fi

      - name: ЁЯТ╛ Save cache
        if: success() && github.event_name != 'pull_request' && steps.cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.gradle/caches/transforms-*
            ~/.gradle/caches/*/transforms
            ~/.gradle/wrapper
          key: ${{ steps.cache-key.outputs.key }}

      - name: ЁЯз╜ Prune old caches
        if: success() && github.event_name != 'pull_request'
        continue-on-error: true
        shell: sh
        env:
          CACHE_KEY: ${{ steps.cache-key.outputs.key }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh cache list --json id,key --limit 100 \
            --jq ".[] | select(.key != \"$CACHE_KEY\") | .id" \
            | while IFS= read -r cache_id; do
                if [ -n "$cache_id" ]; then
                  gh cache delete "$cache_id" || true
                fi
              done

      - name: ЁЯУК Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            build/reports/tests
            build/reports/jacoco

      - name: ЁЯз╛ Upload verifier reports
        if: always() && steps.plan.outputs.release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: plugin-verifier-reports
          path: build/reports/pluginVerifier

      - name: ЁЯУо Upload plugin archive
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: plugin-archive
          path: build/distributions/*.zip
