name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  build:
    name: Test, Verify, Package
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Free disk space
        shell: sh
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Fetch sources
        uses: actions/checkout@v6

      - name: Set up plugin build
        id: plugin-build
        uses: ./.github/actions/setup-plugin-build
        with:
          gradle-cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Test, verify, and build plugin
        shell: sh
        run: ./gradlew --no-daemon check verifyPlugin buildPlugin --warning-mode all

      - name: Save IntelliJ Platform cache
        if: success() && steps.plugin-build.outputs.intellij-cache-hit != 'true' && github.event_name != 'pull_request'
        uses: actions/cache/save@v4
        with:
          path: |
            .intellijPlatform/ides
            .intellijPlatform/localPlatformArtifacts
            .intellijPlatform/layoutIndex
            .intellijPlatform/*.jar
          key: ${{ steps.plugin-build.outputs.intellij-cache-key }}

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            build/reports/tests
            build/reports/jacoco

      - name: Upload verifier reports
        id: upload
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: plugin-verifier-reports
          path: build/reports/pluginVerifier

      - name: Upload plugin archive
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: plugin-archive
          path: build/distributions/*.zip
