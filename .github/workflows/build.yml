name: Pipeline

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag. Empty means today's vYYYY.M.D.
        required: false
        type: string
      dry_run:
        description: Validate release without publishing.
        required: true
        default: false
        type: boolean
  push:
    branches:
      - '**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  actions: write
  contents: write
  packages: write

concurrency:
  group: pipeline-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  pipeline:
    name: Test, Build, Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 🧹 Free disk space
        shell: sh
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: 📥 Fetch sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: 🧭 Decide mode
        id: mode
        shell: sh
        env:
          HEAD_MESSAGE: ${{ github.event.head_commit.message || '' }}
          INPUT_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          INPUT_TAG: ${{ inputs.tag || '' }}
        run: |
          release="false"
          dry_run="false"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            release="true"
            dry_run="$INPUT_DRY_RUN"
          elif [ "$GITHUB_EVENT_NAME" = "push" ] \
            && [ "$GITHUB_REF" = "refs/heads/main" ] \
            && ! printf '%s\n' "$HEAD_MESSAGE" | grep -Eq '^chore: release '; then
            release="true"
          fi

          release_tag=""
          release_version=""
          if [ "$release" = "true" ]; then
            if [ -n "$INPUT_TAG" ]; then
              release_tag="$INPUT_TAG"
            else
              year="$(date -u +%Y)"
              month="$(date -u +%m | sed 's/^0//')"
              day="$(date -u +%d | sed 's/^0//')"
              release_tag="v$year.$month.$day"
            fi

            if ! printf '%s\n' "$release_tag" | grep -Eq '^v[0-9]{4}[.][1-9][0-9]?[.][1-9][0-9]?$'; then
              echo "Tag must look like v2026.5.20: $release_tag" >&2
              exit 1
            fi
            release_version="${release_tag#v}"
          fi

          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$release_version" >> "$GITHUB_OUTPUT"

      - name: 🗝️ Resolve cache key
        id: cache-key
        shell: sh
        run: |
          {
            sed '/^[[:space:]]*pluginVersion[[:space:]]*=/d' gradle.properties
            cat build.gradle settings.gradle gradle/wrapper/gradle-wrapper.properties
          } | sha256sum | awk '{ print "key=plugin-ci-${{ runner.os }}-" $1 }' >> "$GITHUB_OUTPUT"

      - name: ♻️ Restore cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.gradle/caches/transforms-*
            ~/.gradle/caches/*/transforms
            ~/.gradle/wrapper
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            plugin-ci-${{ runner.os }}-

      - name: ☕ Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: 🏷️ Prepare release metadata
        if: steps.mode.outputs.release == 'true'
        shell: sh
        env:
          DRY_RUN: ${{ steps.mode.outputs.dry_run }}
          RELEASE_TAG: ${{ steps.mode.outputs.tag }}
          RELEASE_VERSION: ${{ steps.mode.outputs.version }}
        run: |
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "Tag already exists: $RELEASE_TAG" >&2
            exit 1
          fi

          awk -v version="$RELEASE_VERSION" '
            /^[[:space:]]*pluginVersion[[:space:]]*=/ {
              print "pluginVersion = " version
              next
            }
            { print }
          ' gradle.properties > gradle.properties.tmp
          mv gradle.properties.tmp gradle.properties

          release_date="$(date -u +%Y-%m-%d)"
          if grep -Eq "^## \\[$RELEASE_VERSION\\]" CHANGELOG.md; then
            echo "CHANGELOG.md already contains $RELEASE_VERSION"
          else
            awk -v version="$RELEASE_VERSION" -v release_date="$release_date" '
              /^## \[Unreleased\]/ && !released {
                print "## [Unreleased]"
                print ""
                print "## [" version "] - " release_date
                released = 1
                next
              }
              { print }
            ' CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
          fi

          if ! git diff --quiet -- gradle.properties CHANGELOG.md; then
            git config user.name "Kira"
            git config user.email "kira@yuna.berlin"
            git add gradle.properties CHANGELOG.md
            if [ "$DRY_RUN" = "true" ]; then
              echo "Dry run: would commit release metadata $RELEASE_VERSION"
            else
              git commit -m "chore: release $RELEASE_VERSION [skip ci]"
            fi
          fi

      - name: 🔐 Validate release secrets
        if: steps.mode.outputs.release == 'true' && steps.mode.outputs.dry_run != 'true'
        shell: sh
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          missing=""
          if [ -z "$CERTIFICATE_CHAIN" ]; then
            missing="$missing CERTIFICATE_CHAIN"
          fi
          if [ -z "$PRIVATE_KEY" ]; then
            missing="$missing PRIVATE_KEY"
          fi
          if [ -z "$PRIVATE_KEY_PASSWORD" ]; then
            missing="$missing PRIVATE_KEY_PASSWORD"
          fi
          if [ -z "$PUBLISH_TOKEN" ]; then
            missing="$missing PUBLISH_TOKEN"
          fi

          if [ -n "$missing" ]; then
            echo "Missing release secret(s):$missing" >&2
            exit 1
          fi

      - name: 🧪 Test and package
        shell: sh
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          RELEASE: ${{ steps.mode.outputs.release }}
          DRY_RUN: ${{ steps.mode.outputs.dry_run }}
        run: |
          if [ "$RELEASE" = "true" ] && [ "$DRY_RUN" != "true" ]; then
            ./gradlew --no-daemon check verifyPlugin signPlugin verifyPluginSignature --warning-mode all
          elif [ "$RELEASE" = "true" ]; then
            ./gradlew --no-daemon check verifyPlugin buildPlugin --warning-mode all
          else
            ./gradlew --no-daemon check buildPlugin --warning-mode all
          fi

      - name: 📦 Locate release archive
        id: archive
        if: steps.mode.outputs.release == 'true'
        shell: sh
        env:
          DRY_RUN: ${{ steps.mode.outputs.dry_run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            archive="$(find build/distributions -maxdepth 1 -type f -name '*.zip' | sort | head -n 1)"
          else
            archive="$(find build/distributions -maxdepth 1 -type f -name '*-signed.zip' | sort | head -n 1)"
          fi

          if [ -z "$archive" ]; then
            echo "No release archive found." >&2
            exit 1
          fi

          echo "path=$archive" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$archive")" >> "$GITHUB_OUTPUT"

      - name: 📝 Extract release notes
        if: steps.mode.outputs.release == 'true'
        shell: sh
        env:
          RELEASE_TAG: ${{ steps.mode.outputs.tag }}
        run: |
          version="${RELEASE_TAG#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { found = 1; next }
            found && $0 ~ /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            awk '
              /^## \[Unreleased\]/ { found = 1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md > release-notes.md
          fi

          if [ ! -s release-notes.md ]; then
            printf 'Plugin release %s\n' "$RELEASE_TAG" > release-notes.md
          fi

      - name: 🚀 Create GitHub release
        if: steps.mode.outputs.release == 'true' && steps.mode.outputs.dry_run != 'true'
        shell: sh
        env:
          ARCHIVE_PATH: ${{ steps.archive.outputs.path }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          RELEASE_TAG: ${{ steps.mode.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ARCHIVE_PATH" --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" "$ARCHIVE_PATH" --title "$RELEASE_TAG" --notes-file release-notes.md
          fi

      - name: 📚 Publish GitHub package
        if: steps.mode.outputs.release == 'true' && steps.mode.outputs.dry_run != 'true'
        shell: sh
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: |
          ./gradlew --no-daemon publishPluginZipPublicationToGitHubPackagesRepository --warning-mode all

      - name: 🛒 Publish Marketplace
        if: steps.mode.outputs.release == 'true' && steps.mode.outputs.dry_run != 'true'
        shell: sh
        env:
          ARCHIVE_PATH: ${{ steps.archive.outputs.path }}
          MARKETPLACE_CHANNEL: ${{ vars.MARKETPLACE_CHANNEL || '' }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          plugin_id="$(sed -n 's/^[[:space:]]*pluginId[[:space:]]*=[[:space:]]*//p' gradle.properties | head -n 1 | tr -d '\r')"
          if [ -z "$plugin_id" ]; then
            echo "Missing pluginId in gradle.properties." >&2
            exit 1
          fi

          if [ -n "$MARKETPLACE_CHANNEL" ]; then
            curl --fail-with-body --retry 3 --retry-delay 10 \
              --header "Authorization: Bearer $PUBLISH_TOKEN" \
              -F "xmlId=$plugin_id" \
              -F "file=@$ARCHIVE_PATH" \
              -F "channel=$MARKETPLACE_CHANNEL" \
              https://plugins.jetbrains.com/api/updates/upload
          else
            curl --fail-with-body --retry 3 --retry-delay 10 \
              --header "Authorization: Bearer $PUBLISH_TOKEN" \
              -F "xmlId=$plugin_id" \
              -F "file=@$ARCHIVE_PATH" \
              https://plugins.jetbrains.com/api/updates/upload
          fi

      - name: 📤 Push release commit and tag
        if: steps.mode.outputs.release == 'true' && steps.mode.outputs.dry_run != 'true'
        shell: sh
        env:
          RELEASE_TAG: ${{ steps.mode.outputs.tag }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git config user.name "Kira"
          git config user.email "kira@yuna.berlin"

          if [ -n "$RELEASE_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

          target_branch="${GITHUB_REF_NAME:-main}"
          git push origin "HEAD:$target_branch"
          git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG [skip ci]"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: 💾 Save cache
        if: success() && github.event_name != 'pull_request' && steps.cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.gradle/caches/transforms-*
            ~/.gradle/caches/*/transforms
            ~/.gradle/wrapper
          key: ${{ steps.cache-key.outputs.key }}

      - name: 🧽 Prune old caches
        if: success() && github.event_name != 'pull_request'
        continue-on-error: true
        shell: sh
        env:
          CACHE_KEY: ${{ steps.cache-key.outputs.key }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh cache list --json id,key --limit 100 \
            --jq ".[] | select(.key != \"$CACHE_KEY\") | .id" \
            | while IFS= read -r cache_id; do
                if [ -n "$cache_id" ]; then
                  gh cache delete "$cache_id" || true
                fi
              done

      - name: 📊 Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            build/reports/tests
            build/reports/jacoco

      - name: 🧾 Upload verifier reports
        if: always() && steps.mode.outputs.release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: plugin-verifier-reports
          path: build/reports/pluginVerifier

      - name: 📮 Upload plugin archive
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: plugin-archive
          path: build/distributions/*.zip
