import org.jetbrains.changelog.Changelog
import org.jetbrains.intellij.platform.gradle.TestFrameworkType
import org.jetbrains.intellij.platform.gradle.tasks.VerifyPluginTask

plugins {
    id 'java'
    id 'jacoco'
    id 'org.jetbrains.intellij.platform' version '2.16.0'
    id 'org.jetbrains.changelog' version '2.5.0'
}

def requiredProperty = { name -> providers.gradleProperty(name).get() }
def csvProperty = { name ->
    providers.gradleProperty(name).map { value ->
        value.split(',').collect { it.trim() }.findAll { !it.isEmpty() }
    }.get()
}
def htmlText = { value ->
    value
            .replaceAll(/(?s)<br\s*\/?>/, ' ')
            .replaceAll(/(?s)<[^>]+>/, '')
            .replace('&amp;', '&')
            .replace('&#x3C;', '<')
            .replace('&#x27;', '\'')
            .replace('&quot;', '"')
            .replace('&gt;', '>')
            .replaceAll(/\s+/, ' ')
            .trim()
}
def downloadText = { url ->
    def connection = new URI(url).toURL().openConnection()
    connection.setRequestProperty('User-Agent', 'github-workflow-plugin-docs-generator')
    connection.inputStream.withCloseable { stream -> stream.getText('UTF-8') }
}
def parseDocsTable = { html, tableId, prefix, typed ->
    def tableMatcher = html =~ /(?s)<table aria-labelledby="${java.util.regex.Pattern.quote(tableId)}".*?<\/table>/
    if (!tableMatcher.find()) {
        throw new GradleException("Could not find GitHub Docs table: ${tableId}")
    }
    def result = new LinkedHashMap<String, String>()
    def rowPattern = typed
            ? /(?s)<tr><td><code>(.*?)<\/code><\/td><td><code>.*?<\/code><\/td><td>(.*?)<\/td><\/tr>/
            : /(?s)<tr><td><code>(.*?)<\/code><\/td><td>(.*?)<\/td><\/tr>/
    def rowMatcher = tableMatcher.group() =~ rowPattern
    rowMatcher.each { match ->
        def name = htmlText(match[1])
        if (prefix != null && !name.startsWith("${prefix}.")) {
            return
        }
        def key = prefix == null ? name : name.substring(prefix.length() + 1)
        if (!key.contains('<')) {
            result.put(key, htmlText(match[2]))
        }
    }
    if (result.isEmpty()) {
        throw new GradleException("GitHub Docs table produced no values: ${tableId}")
    }
    result
}
def writeTsv = { values, outputFile ->
    outputFile.parentFile.mkdirs()
    outputFile.withWriter('UTF-8') { writer ->
        writer.writeLine('# Generated by ./gradlew generateGitHubDocsData from GitHub Docs.')
        values.each { key, value -> writer.writeLine("${key}\t${value}") }
    }
}

group = requiredProperty('pluginGroup')
version = requiredProperty('pluginVersion')

repositories {
    mavenCentral()
    intellijPlatform {
        defaultRepositories()
    }
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.assertj:assertj-core:3.26.3'

    intellijPlatform {
        intellijIdea(requiredProperty('platformVersion'))
        bundledPlugins(csvProperty('platformPlugins'))
        pluginVerifier()
        testFramework(TestFrameworkType.Platform.INSTANCE)
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
    options.compilerArgs.addAll(['-Xlint:deprecation', '-Xlint:unchecked'])
}

tasks.withType(Test).configureEach {
    useJUnit()
    systemProperty 'PLUGIN_HOME_PATH', rootDir.absolutePath
    testLogging {
        events 'failed', 'skipped'
        exceptionFormat = 'full'
    }
}

tasks.named('test') {
    exclude '**/WorkflowPerformanceTest.class'
    finalizedBy tasks.jacocoTestReport
}

tasks.register('performanceTest', Test) {
    def unitTest = tasks.named('test', Test).get()
    group = 'verification'
    description = 'Runs bounded editor performance regression tests.'
    jacoco.enabled = false
    dependsOn tasks.named('prepareTest')
    testClassesDirs = unitTest.testClassesDirs
    classpath = unitTest.classpath
    javaLauncher.set(unitTest.javaLauncher)
    useJUnit()
    jvmArgumentProviders.addAll(unitTest.jvmArgumentProviders.findAll {
        !it.class.name.contains('Jacoco')
    })
    jvmArgs unitTest.jvmArgs
    jvmArgs '--add-opens=java.base/java.lang=ALL-UNNAMED'
    systemProperties.putAll(unitTest.systemProperties)
    systemProperty 'PLUGIN_HOME_PATH', rootDir.absolutePath
    include '**/WorkflowPerformanceTest.class'
    shouldRunAfter tasks.test
    testLogging {
        events 'failed', 'skipped'
        exceptionFormat = 'full'
    }
}

tasks.named('check') {
    dependsOn tasks.named('performanceTest')
}

tasks.register('generateGitHubDocsData') {
    group = 'documentation'
    description = 'Refreshes checked-in GitHub Actions context and default environment variable snapshots from GitHub Docs.'
    def githubContextFile = layout.projectDirectory.file('src/main/resources/github-docs/github-context.tsv')
    def defaultEnvFile = layout.projectDirectory.file('src/main/resources/github-docs/default-env.tsv')
    outputs.files(githubContextFile, defaultEnvFile)
    doLast {
        def contextsHtml = downloadText('https://docs.github.com/en/actions/reference/workflows-and-actions/contexts')
        def variablesHtml = downloadText('https://docs.github.com/en/actions/reference/workflows-and-actions/variables')

        writeTsv(parseDocsTable(contextsHtml, 'github-context', 'github', true), githubContextFile.asFile)
        writeTsv(parseDocsTable(variablesHtml, 'default-environment-variables', null, false), defaultEnvFile.asFile)
    }
}

jacoco {
    toolVersion = '0.8.13'
}

jacocoTestReport {
    dependsOn tasks.test
    reports {
        xml.required = true
        html.required = true
    }
}

intellijPlatform {
    pluginConfiguration {
        id = requiredProperty('pluginId')
        name = requiredProperty('pluginName')
        version = requiredProperty('pluginVersion')
        description = requiredProperty('pluginDescription')
        changeNotes = provider {
            changelog.renderItem(changelog.getLatest(), Changelog.OutputType.HTML)
        }

        ideaVersion {
            sinceBuild = requiredProperty('pluginSinceBuild')
        }

        vendor {
            name = requiredProperty('vendorName')
            email = requiredProperty('vendorEmail')
            url = requiredProperty('pluginUrl')
        }
    }

    pluginVerification {
        failureLevel = [
                VerifyPluginTask.FailureLevel.COMPATIBILITY_PROBLEMS,
                VerifyPluginTask.FailureLevel.MISSING_DEPENDENCIES,
                VerifyPluginTask.FailureLevel.INVALID_PLUGIN,
                VerifyPluginTask.FailureLevel.SCHEDULED_FOR_REMOVAL_API_USAGES,
                VerifyPluginTask.FailureLevel.INTERNAL_API_USAGES,
                VerifyPluginTask.FailureLevel.DEPRECATED_API_USAGES
        ]
        ides {
            recommended()
        }
    }

    publishing {
        token = providers.environmentVariable('PUBLISH_TOKEN')
    }

    signing {
        certificateChain = providers.environmentVariable('CERTIFICATE_CHAIN')
        privateKey = providers.environmentVariable('PRIVATE_KEY')
        password = providers.environmentVariable('PRIVATE_KEY_PASSWORD')
    }
}

changelog {
    groups.empty()
    repositoryUrl = requiredProperty('pluginUrl')
}
